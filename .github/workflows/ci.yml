name: CI

# Tilpasset fra qlim8-app: lint · type check · build · test (unit/integration/db).
# Intet CD-job her: hosting = Netlify (ADR 0012), og deploy sker via Netlifys
# Git-integration — ikke GitHub Actions. Se docs/fase-0-rapport.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  integration-db-tests:
    name: Integration & DB tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: abaas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/abaas_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/abaas_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # db-projektets globalSetup nulstiller schemaet og anvender
      # auth-shim + supabase/migrations + supabase/policies + seed.
      - run: npm run test:integration
      - run: npm run test:db

  # ───────────────────────────────────────────────────────────────────────────
  # deploy: håndteres af Netlify (ADR 0012), ikke af GitHub Actions.
  # Netlify bygger og deployer fra Git-integrationen (`netlify.toml`,
  # @netlify/plugin-nextjs). Runtime-secrets lever i Netlify > Environment
  # variables (ADR 0008). Derfor intet CD-job her.
  # ───────────────────────────────────────────────────────────────────────────
